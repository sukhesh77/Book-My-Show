apiVersion: apps/v1
kind: Deployment
metadata:
  name: bms-deployment
  namespace: sukhesh-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bms
  template:
    metadata:
      labels:
        app: bms
    spec:
      containers:
      - name: bms
        image sukhesh77/bookmyshow-app:v1
        ports:
        - containerPort: 3000

